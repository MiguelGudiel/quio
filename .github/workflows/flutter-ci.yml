name: Flutter CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version

      - run: flutter pub get

      - run: dart format --output=none --set-exit-if-changed .

      - run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - run: flutter test